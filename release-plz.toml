# release-plz configuration.
#
# Versions are independent per crate (each bumps only on its own changes), and so
# are tags and GitHub Releases: each crate gets its own `<crate>-vX.Y.Z` tag and
# Release (release-plz's default for a multi-package workspace). release-plz
# baselines a *published* crate on crates.io (its version + recorded commit), not
# on a git tag, so per-crate bumps and changelogs are computed correctly. A
# breaking library bump still cascades a small CLI bump (release-plz updates the
# CLI's `sql-insight` dependency requirement). Tags from before this switch use
# the old plain `vX.Y.Z` scheme (the library's history) and are left as-is.
#
# See https://release-plz.dev/docs/config for the full schema.

[workspace]
# Every crate is tagged + GitHub-released, under release-plz's default per-crate
# tag name `{{ package }}-v{{ version }}` (so no `git_tag_name` override here).
git_tag_enable = true
git_release_enable = true

[changelog]
# Keep a Changelog format. `protect_breaking_commits` keeps breaking changes
# visible even if a future skip rule would otherwise drop them.
protect_breaking_commits = true

# Changelog preamble. Kept in sync with the header already in each CHANGELOG.md
# (Keep a Changelog 1.1.0) so release-plz strips and re-inserts it cleanly —
# release-plz's built-in default links 1.0.0, so we override it here.
header = '''
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]
'''

# Group order is set by the `<!-- N -->` sort prefixes (Tera sorts groups
# alphabetically); the prefixes are hidden at render time by `striptags` in the
# body below. Internal types are bucketed into "Other Changes" rather than
# dropped, so their contributors still get credited. The trailing `.*` catches
# anything unmatched so it never lands in an unnamed group; merge commits are
# skipped first so they don't show up via that catch-all (relevant mainly for the
# first run's backlog — squash-merged history has no merge commits).
commit_parsers = [
    { message = "^Merge ", skip = true },
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^revert", group = "<!-- 1 -->Changed" },
    { message = "^deprecate", group = "<!-- 2 -->Deprecated" },
    { message = "^fix", group = "<!-- 3 -->Fixed" },
    { message = "^perf", group = "<!-- 4 -->Performance" },
    { message = "^docs", group = "<!-- 5 -->Documentation" },
    { message = "^refactor", group = "<!-- 6 -->Other Changes" },
    { message = "^test", group = "<!-- 6 -->Other Changes" },
    { message = "^ci", group = "<!-- 6 -->Other Changes" },
    { message = "^build", group = "<!-- 6 -->Other Changes" },
    { message = "^chore", group = "<!-- 6 -->Other Changes" },
    { message = ".*", group = "<!-- 6 -->Other Changes" },
]

# Custom body: a top "Breaking Changes" section (every commit flagged
# `commit.breaking`, via `!` or a BREAKING CHANGE footer), then the normal groups
# with breaking commits excluded and empty groups skipped — so a breaking change
# is listed once, at the top. `striptags` honors the `<!-- N -->` sort prefixes;
# ` by @user` credits the author. The PR link comes from the subject's `(#N)`,
# which release-plz's default commit_preprocessor turns into a markdown link, so
# it is not repeated here (squash merges put `(#N)` in the subject).
#
# Each breaking change is a `####` heading (its subject) plus an optional block:
# the text wrapped between `**▼ changelog ▼**` / `**▲ changelog ▲**` in the PR
# description (see .github/pull_request_template.md), sliced from
# `commit.raw_message` (not `commit.body`, whose footer parsing would eat a
# `label:` line). The block may span paragraphs and code fences and carry
# `**sql-insight:**` / `**sql-insight-cli:**` labels. No markers → just the heading.
body = '''

## [{{ version }}]{%- if release_link -%}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% set breaking = commits | filter(attribute="breaking", value=true) -%}
{% if breaking | length > 0 %}
### ⚠️ Breaking Changes
{% for commit in breaking %}
#### {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message }}
{%- set parts = commit.raw_message | default(value="") | split(pat="**▼ changelog ▼**") -%}
{%- if parts | length > 1 -%}
{%- set note = parts | last | split(pat="**▲ changelog ▲**") | first | trim -%}
{%- if note %}

{{ note }}
{%- endif -%}
{%- endif %}
{% endfor -%}
{% endif -%}
{% for group, group_commits in commits | group_by(attribute="group") %}
{%- set rest = group_commits | filter(attribute="breaking", value=false) -%}
{% if rest | length > 0 %}
### {{ group | striptags | trim | upper_first }}

{% for commit in rest %}
{%- if commit.scope -%}
- *({{ commit.scope }})* {{ commit.message }}{% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}{%- if commit.links %} ({% for link in commit.links %}[{{ link.text }}]({{ link.href }}) {% endfor -%}){% endif %}
{% else -%}
- {{ commit.message }}{% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}
{% endif -%}
{% endfor -%}
{% endif -%}
{% endfor %}'''
