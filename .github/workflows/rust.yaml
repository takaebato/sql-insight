name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:

  codestyle:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: rustfmt
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: cargo fmt --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: cargo check --locked --all-targets --all-features

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install cargo-msrv
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-msrv
      - name: Verify sql-insight MSRV
        working-directory: sql-insight
        run: cargo msrv verify

  docs:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-Dwarnings"
    steps:
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: cargo doc --locked --document-private-items --no-deps --workspace --all-features

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Test
        run: cargo test --locked --workspace --all-features

  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-llvm-cov
          fallback: none
      - name: Coverage
        # `--codecov` (vs `--lcov`) preserves region coverage on Codecov's UI;
        # `--lcov` collapses to line-only there.
        run: cargo llvm-cov --locked --all-features --workspace --codecov --output-path codecov.json
      # Upload straight from this job: it has the source tree checked out, which
      # Codecov needs to path-fix the report — without it every file is dropped
      # and the commit lands as "error" with 0% coverage.
      #   push + same-repo PR: CODECOV_TOKEN is present -> authenticated upload.
      #   fork PR: secrets are withheld, so the empty token makes codecov-action
      #   fall back to tokenless upload (public repo; v4+ prefixes the branch).
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          files: codecov.json
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: takaebato/sql-insight
          fail_ci_if_error: true
